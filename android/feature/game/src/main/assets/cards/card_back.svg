<svg width="103.2" height="168.2" version="1.1" viewBox="0 0 103.2 168.2" xmlns="http://www.w3.org/2000/svg">
 <!-- 카드 뒷면. 자체 저작(CC-BY-SA 앞면 path 재사용 없음). -->
 <!-- 카드 치수/코너 반경/빨간색은 덱 통일을 위한 기능적 값이며, 표준 rect 도형으로 독립 작성. -->
 <!-- 바깥 빨간 라운드 사각형 (앞면과 동일 실루엣: 103.2x168.2, r5, #ef1d1e) -->
 <rect x="0" y="0" width="103.2" height="168.2" rx="5" ry="5" fill="#ef1d1e"/>
 <!-- 안쪽 프레임 라인 — 대칭 인셋(가로세로 8), r6. 앞면의 비대칭 프레임과 다른 자체 도안. -->
 <rect x="8" y="8" width="87.2" height="152.2" rx="6" ry="6" fill="none" stroke="#000" stroke-width="1.2"/>
 <!-- 앱 아이콘 자리. 원점(0,0)이 카드 정중앙(51.6,84.1). 이 그룹 안에 아이콘 path를 넣으면 중앙 정렬됨. -->
 <!-- 권장: 아이콘을 자체 원점 기준 중앙 정렬, 최대 크기 약 56x56 (안쪽 폭의 ~64%). -->
 <g id="app-icon" transform="translate(51.6 84.1)">
  <!-- 아이콘 삽입 예정 (예: <path d="..." transform="translate(-28 -28) scale(...)"/>) -->
 </g>
</svg>
